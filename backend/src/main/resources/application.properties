spring.application.name=classannounce
server.port=8080

# PostgreSQL Database (passwordless authentication)
spring.datasource.url=jdbc:postgresql://localhost:5432/classannounce
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=xxxxxxxx
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (CHANGE IN PRODUCTION)
jwt.secret=ClassAnnounceSecretKeyForJWTTokenGenerationMustBeLongEnough256Bits
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173

# Email (SMTP) - Configure for production
spring.mail.host=MAIL_HOST:smtp.gmail.com
spring.mail.port=587
spring.mail.username=xxx@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URL for magic links
app.base-url=http://localhost:5173

logging.level.org.springframework.security=DEBUG